<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>test</title>

    <link rel="stylesheet" href="test.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap" rel="stylesheet">

  </head>

 

  <body>
    <header>
      <div class="logo_left">
        <img src="assets/images/gleeicon.PNG" alt="Glee Club Icon" class="logo">
      </div>
      <div class="logo_right">
        <a class="button_wrapper_icon" href="mailto:contact@icuglee.com">
          <img src="assets/images/email.svg" alt="Contact us by email" class="logo">
        </a>
        <a class="button_wrapper_icon" href="https://www.instagram.com/icugleeclub?igsh=bjZtYjdlNm5kbTd0" target="_blank">
          <img src="assets/images/instagram.png" alt="Follow by Instagram" class="logo">
        </a>
        <a class="button_wrapper_icon" href="https://x.com/icuglee?s=20" target="_blank">
          <img src="assets/images/x.png" alt="Follow by X" class="logo">
        </a>
      </div>
    </header>
    <div class="bg_chapel"></div>
    <section class="page">
      <div class="margin_box_top"></div>
      <div class="window">
        The Oldest<br>
        Singers' Club<br>
        at ICU
      </div>
      <div class="about">
        About
        <div class="about_content">
          ICUグリークラブは、国際基督教大学の学生を中心に30名程の団員を抱える混声合唱団です。<br>
          <br>
          1953年、国際基督教大学献学と同年に創立した、ICUで最も歴史の長いサークルです。創立当初から歌い継ぐ黒人霊歌のほか、宗教曲やポップスに至るまで、演奏の幅は多岐にわたります。<br>
          <br>現在は、春・秋の演奏会のほかに、大学式典や大学礼拝での奏楽を中心に活動を行っており、そのいずれも運営から指揮・伴奏にいたるまで、すべて学生自身の手でつくられています。
        </div>
      </div>

      <div class="parallax_window">
        <div class="parallax_bg"></div>
        <div class="parallax_inner"></div>
      </div>


    </section>


    <script src="test.js"></script>
